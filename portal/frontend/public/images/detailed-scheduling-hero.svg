<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Detailed Scheduling Tool">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16352b"/>
      <stop offset="100%" stop-color="#0a1f18"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f4a3b"/>
      <stop offset="100%" stop-color="#153228"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- App shell -->
  <rect x="60" y="50" width="1800" height="980" rx="24" fill="url(#panel)" stroke="#3d7a62" stroke-width="2"/>
  <rect x="60" y="50" width="250" height="980" rx="24" fill="#102820"/>
  <rect x="310" y="50" width="1550" height="78" fill="#17372c"/>
  <text x="95" y="108" fill="#00b37a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Detailed Scheduling</text>
  <text x="95" y="142" fill="#b8d6ca" font-family="Inter, Arial, sans-serif" font-size="17">Line Optimization · Swimlane Gantt</text>

  <!-- Sidebar items -->
  <g font-family="Inter, Arial, sans-serif" font-size="18">
    <rect x="85" y="195" width="190" height="44" rx="10" fill="#007F58"/>
    <text x="105" y="224" fill="#ffffff">Daily Wizard</text>
    <text x="105" y="285" fill="#d7efe4">Line Optimization</text>
    <text x="105" y="335" fill="#b8d6ca">Simulation</text>
    <text x="105" y="385" fill="#b8d6ca">Control Tower</text>
  </g>

  <!-- Toolbar -->
  <rect x="350" y="78" width="128" height="36" rx="18" fill="#007F58"/>
  <text x="382" y="102" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Optimize</text>
  <rect x="495" y="78" width="118" height="36" rx="18" fill="#245944" stroke="#3d7a62"/>
  <text x="520" y="102" fill="#e8f5ef" font-family="Inter, Arial, sans-serif" font-size="15">Simulate</text>

  <!-- Timeline header -->
  <rect x="310" y="128" width="1550" height="52" fill="#1a4034"/>
  <g stroke="#2f6653" stroke-width="1">
    <line x1="520" y1="128" x2="520" y2="980"/>
    <line x1="760" y1="128" x2="760" y2="980"/>
    <line x1="1000" y1="128" x2="1000" y2="980"/>
    <line x1="1240" y1="128" x2="1240" y2="980"/>
    <line x1="1480" y1="128" x2="1480" y2="980"/>
    <line x1="1720" y1="128" x2="1720" y2="980"/>
  </g>
  <text x="350" y="160" fill="#d7efe4" font-family="Inter, Arial, sans-serif" font-size="14">2026-09-01</text>
  <text x="760" y="160" fill="#9bc4b3" font-family="Inter, Arial, sans-serif" font-size="14">Sep 05</text>
  <text x="1180" y="160" fill="#9bc4b3" font-family="Inter, Arial, sans-serif" font-size="14">Sep 10</text>
  <text x="1680" y="160" fill="#d7efe4" font-family="Inter, Arial, sans-serif" font-size="14">2026-09-15</text>

  <!-- Swimlanes -->
  <g>
    <rect x="310" y="200" width="1550" height="118" fill="#17372c" stroke="#2f6653"/>
    <rect x="310" y="328" width="1550" height="118" fill="#153228" stroke="#2f6653"/>
    <rect x="310" y="456" width="1550" height="118" fill="#17372c" stroke="#2f6653"/>
    <rect x="310" y="584" width="1550" height="118" fill="#153228" stroke="#2f6653"/>
    <rect x="310" y="712" width="1550" height="118" fill="#17372c" stroke="#2f6653"/>
    <rect x="310" y="840" width="1550" height="118" fill="#153228" stroke="#2f6653"/>

    <text x="330" y="248" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">L01</text>
    <text x="330" y="376" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">L02</text>
    <text x="330" y="504" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">L03</text>
    <text x="330" y="632" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">L04</text>
    <text x="330" y="760" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">L05</text>

    <!-- Gantt bars -->
    <rect x="520" y="236" width="240" height="48" rx="10" fill="#007F58"/>
    <rect x="820" y="236" width="190" height="48" rx="10" fill="#00a36f"/>
    <rect x="1180" y="236" width="280" height="48" rx="10" fill="#009463"/>

    <rect x="620" y="364" width="320" height="48" rx="10" fill="#007F58"/>
    <rect x="980" y="364" width="160" height="48" rx="10" fill="#00a36f"/>

    <rect x="480" y="492" width="210" height="48" rx="10" fill="#00a36f"/>
    <rect x="760" y="492" width="340" height="48" rx="10" fill="#007F58"/>
    <rect x="1320" y="492" width="220" height="48" rx="10" fill="#009463"/>

    <rect x="700" y="620" width="260" height="48" rx="10" fill="#007F58"/>
    <rect x="1080" y="620" width="180" height="48" rx="10" fill="#00a36f"/>

    <rect x="560" y="748" width="300" height="48" rx="10" fill="#009463"/>
    <rect x="920" y="748" width="380" height="48" rx="10" fill="#007F58"/>
    <rect x="1380" y="748" width="200" height="48" rx="10" fill="#00a36f"/>
  </g>

  <!-- Capacity panel -->
  <rect x="1460" y="870" width="340" height="96" rx="16" fill="#1a4034" stroke="#3d7a62"/>
  <text x="1485" y="905" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Work Center Capacity</text>
  <rect x="1485" y="922" width="240" height="12" rx="6" fill="#245944"/>
  <rect x="1485" y="922" width="168" height="12" rx="6" fill="#007F58"/>
</svg>
