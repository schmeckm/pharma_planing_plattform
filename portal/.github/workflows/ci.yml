name: CI

on:
  push:
    paths:
      - 'portal/**'
  pull_request:
    paths:
      - 'portal/**'

defaults:
  run:
    working-directory: portal

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: portal/backend/package-lock.json
      - name: Install backend deps
        working-directory: portal/backend
        run: npm install
      - name: Backend tests
        working-directory: portal/backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-with-enough-length-for-ci
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: portal/frontend/package-lock.json
      - name: Install frontend deps
        working-directory: portal/frontend
        run: npm install
      - name: Frontend build
        working-directory: portal/frontend
        run: npm run build
