name: Docker Publish

on:
  push:
    tags:
      - 'portal-v*'

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: portal/${{ matrix.component }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/portal-${{ matrix.component }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/portal-${{ matrix.component }}:${{ github.sha }}
